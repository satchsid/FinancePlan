services:

  db:
    image: postgres:16-alpine
    container_name: finance_db_new
    environment:
      POSTGRES_DB: financedb
      POSTGRES_USER: finance
      POSTGRES_PASSWORD: finance
      TZ: America/New_York
    volumes:
      - postgres_data_new:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    ports:
      - "5434:5432"  # use 5434 on host to avoid conflict
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finance -d financedb"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: finance_backend_new
    environment:
      DATABASE_URL: postgresql://finance:finance@db:5432/financedb
      # Path inside the container where bank_statements.csv is mounted.
      BANK_STATEMENTS_CSV: /data/bank_statements.csv
      TZ: America/New_York
    volumes:
      - ./data:/data:ro          # read-only mount
    ports:
      - "8001:8000"              # use 8001 on host to avoid conflict
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: finance_frontend_new
    ports:
      - "3002:80"                # use 3002 on host to avoid conflict
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data_new:
